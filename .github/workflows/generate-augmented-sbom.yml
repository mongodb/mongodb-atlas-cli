name: Augment SBOM

on:
  workflow_dispatch:

jobs:
  echo-secret:
    name: Echo ASSIGNEE_JIRA_TICKET
    runs-on: ubuntu-latest
    steps:
      # Base64 output avoids GitHub's secret masking so you can verify the value.
      # Decode locally: echo '<base64-from-log>' | base64 -d
      - name: Echo ASSIGNEE_JIRA_TICKET (base64, decode to see value)
        run: |
          echo "ASSIGNEE_JIRA_TICKET (base64):"
          echo -n "${{ secrets.ASSIGNEE_JIRA_TICKET }}" | base64
